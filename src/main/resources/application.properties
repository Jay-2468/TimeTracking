spring.application.name=TimeTracking

# Server
server.port=9999

# JSP 
spring.mvc.view.suffix=.jsp
spring.mvc.view.prefix=/WEB-INF/views/

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mail configuration - gmail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Max request data count
server.tomcat.max-part-count=30
# Maxumum size of a single file (e.g.,10MB)
spring.servlet.multipart.max-file-size=10MB
# Maximum size of the entire request (e.g., 12MB)
spring.servlet.multipart.max-request-size=12MB

# Authorize.net config
payment.gateway.login-id=${AUTH_NET_LOGIN_ID}
payment.gateway.transaction-key=${AUTH_NET_TRANSACTION_KEY}
payment.gateway.environment=SANDBOX

# Cloudinary config
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}